version: 1
agent:
  name: ""
  system_prompt_path: ./system.md
  system_prompt_args:
    ROLE_ADDITIONAL: |
      You are running with OMK (Kimi Orchestration & Multi-agent Coordination).
      When the user request matches a OMK skill trigger, activate that skill and follow its workflow.
      When delegating to subagents, use the OMK agent catalog to select the most appropriate one.
      OMK state is stored in `.omk/state/`. Use ReadFile/WriteFile to manage state when skills require it.
  tools:
    - "kimi_cli.tools.agent:Agent"
    - "kimi_cli.tools.ask_user:AskUserQuestion"
    - "kimi_cli.tools.todo:SetTodoList"
    - "kimi_cli.tools.shell:Shell"
    - "kimi_cli.tools.background:TaskList"
    - "kimi_cli.tools.background:TaskOutput"
    - "kimi_cli.tools.background:TaskStop"
    - "kimi_cli.tools.file:ReadFile"
    - "kimi_cli.tools.file:ReadMediaFile"
    - "kimi_cli.tools.file:Glob"
    - "kimi_cli.tools.file:Grep"
    - "kimi_cli.tools.file:WriteFile"
    - "kimi_cli.tools.file:StrReplaceFile"
    - "kimi_cli.tools.web:SearchWeb"
    - "kimi_cli.tools.web:FetchURL"
    - "kimi_cli.tools.plan:ExitPlanMode"
    - "kimi_cli.tools.plan.enter:EnterPlanMode"
  subagents:
    coder:
      path: ./coder.yaml
      description: "Good at general software engineering tasks."
    explore:
      path: ./explore.yaml
      description: "Fast codebase exploration with prompt-enforced read-only behavior."
    plan:
      path: ./plan.yaml
      description: "Read-only implementation planning and architecture design."
    architect:
      path: ./architect.yaml
      description: "System design, boundaries, interfaces, and long-horizon tradeoffs."
    executor:
      path: ./executor.yaml
      description: "Code implementation, refactoring, and feature work."
    debugger:
      path: ./debugger.yaml
      description: "Root-cause analysis, regression isolation, and failure diagnosis."
    critic:
      path: ./critic.yaml
      description: "Plan and design critical challenge."
    analyst:
      path: ./analyst.yaml
      description: "Requirements clarity, acceptance criteria, and hidden constraints."
    designer:
      path: ./designer.yaml
      description: "UI/UX architecture and interaction design."
    writer:
      path: ./writer.yaml
      description: "Documentation, migration notes, and user guidance."
    verifier:
      path: ./verifier.yaml
      description: "Completion evidence, claim validation, and test adequacy."
    tracer:
      path: ./tracer.yaml
      description: "Evidence-driven causal tracing and competing hypotheses."
    code-reviewer:
      path: ./code-reviewer.yaml
      description: "Comprehensive code review across logic, maintainability, and quality."
    security-reviewer:
      path: ./security-reviewer.yaml
      description: "Security vulnerabilities, trust boundaries, and authn/authz review."
    test-engineer:
      path: ./test-engineer.yaml
      description: "Test strategy, coverage improvements, and flaky-test hardening."
    document-specialist:
      path: ./document-specialist.yaml
      description: "Official documentation lookup and external API reference guidance."
    code-simplifier:
      path: ./code-simplifier.yaml
      description: "Code clarity, simplification, and cleanup passes."
    scientist:
      path: ./scientist.yaml
      description: "Parallel scientific and data-heavy analysis."
